services:
  - type: web
    name: vera-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot:app --host 0.0.0.0 --port $PORT --log-level info
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TEAM_NAME
        value: YourName
      - key: CONTACT_EMAIL
        value: you@example.com
    healthCheckPath: /v1/healthz
